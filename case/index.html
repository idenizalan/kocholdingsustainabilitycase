<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapay Zeka Quiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- ANIMATED BACKGROUND --- */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 12s ease-in-out infinite;
        }

        .bg-animation .orb:nth-child(1) {
            width: 400px; height: 400px;
            background: #e94560;
            top: -100px; left: -100px;
            animation-duration: 14s;
        }

        .bg-animation .orb:nth-child(2) {
            width: 350px; height: 350px;
            background: #0f3460;
            bottom: -80px; right: -80px;
            animation-duration: 18s;
            animation-delay: -4s;
        }

        .bg-animation .orb:nth-child(3) {
            width: 250px; height: 250px;
            background: #533483;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 10s;
            animation-delay: -2s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 40px) scale(0.95); }
            75% { transform: translate(30px, 20px) scale(1.02); }
        }

        /* --- CONTAINER (Glassmorphism) --- */
        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            width: 92%;
            background: rgba(22, 33, 62, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 44px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        /* --- SECTION TRANSITIONS --- */
        .section {
            animation: sectionIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes sectionIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- VIDEO SECTION --- */
        #video-section {
            text-align: center;
        }

        #video-section h1 {
            margin-bottom: 8px;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { filter: brightness(1); }
            to   { filter: brightness(1.3); }
        }

        #video-section .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        #mock-video-canvas {
            width: 100%;
            border-radius: 16px;
            background: #000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        #video-subtitle {
            margin-top: 16px;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
        }

        /* --- BUTTONS --- */
        .btn-primary {
            padding: 14px 44px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e94560, #c81e45);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            padding: 13px 36px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: rgba(15, 52, 96, 0.8);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.3px;
        }

        .btn-secondary:hover {
            background: rgba(26, 74, 138, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        #start-quiz-btn {
            margin-top: 28px;
            display: none;
            animation: btnPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes btnPop {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- QUIZ SECTION --- */
        #quiz-section {
            display: none;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .question-count {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- CIRCULAR TIMER --- */
        .timer-wrapper {
            position: relative;
            width: 52px;
            height: 52px;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 52px;
            height: 52px;
        }

        .timer-track {
            fill: none;
            stroke: rgba(255,255,255,0.08);
            stroke-width: 3;
        }

        .timer-fill {
            fill: none;
            stroke: #e94560;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 138.23;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
        }

        .timer-fill.warning {
            stroke: #ff4757;
            animation: timerPulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes timerPulse {
            to { stroke: #ff6b81; stroke-width: 4; }
        }

        .timer-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
        }

        .timer-text.warning {
            color: #ff4757;
        }

        /* --- PROGRESS BAR --- */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            margin-bottom: 32px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b8a);
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        /* --- QUESTION --- */
        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 28px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeSlideIn 0.5s 0.1s forwards;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* --- OPTIONS --- */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 16px 22px;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            color: #eee;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(12px);
        }

        .option-btn.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .option-btn .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 14px;
            transition: all 0.3s;
        }

        .option-btn:hover {
            border-color: rgba(233, 69, 96, 0.5);
            background: rgba(233, 69, 96, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .option-btn:hover .option-letter {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
        }

        .option-btn.correct {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.12);
            animation: correctPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .option-btn.correct .option-letter {
            background: rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .option-btn.wrong {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.12);
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        .option-btn.wrong .option-letter {
            background: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .option-btn:disabled {
            cursor: default;
            pointer-events: none;
        }

        #next-btn {
            margin-top: 28px;
            display: none;
            animation: btnPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- SCORE FLASH --- */
        .score-flash {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 800;
            pointer-events: none;
            z-index: 100;
            animation: scoreFlash 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .score-flash.correct { color: #2ecc71; }
        .score-flash.wrong { color: #e74c3c; }
        .score-flash.timeout { color: #f39c12; }

        @keyframes scoreFlash {
            0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
        }

        /* --- RESULT SECTION --- */
        #result-section {
            display: none;
            text-align: center;
        }

        .result-icon {
            font-size: 5rem;
            margin-bottom: 16px;
            animation: resultBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes resultBounce {
            from { opacity: 0; transform: scale(0) rotate(-10deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        #result-section h2 {
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeSlideIn 0.5s 0.3s forwards;
        }

        .score-text {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeSlideIn 0.5s 0.5s forwards;
        }

        .score-bar-wrapper {
            width: 80%;
            max-width: 350px;
            margin: 20px auto;
            opacity: 0;
            animation: fadeSlideIn 0.5s 0.6s forwards;
        }

        .score-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 5px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 5px;
            width: 0;
            transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s;
        }

        .score-bar-fill.pass { background: linear-gradient(90deg, #2ecc71, #27ae60); box-shadow: 0 0 12px rgba(46,204,113,0.4); }
        .score-bar-fill.fail { background: linear-gradient(90deg, #e74c3c, #c0392b); box-shadow: 0 0 12px rgba(231,76,60,0.4); }

        .threshold-marker {
            position: relative;
            width: 100%;
            height: 2px;
            margin-top: 4px;
        }

        .threshold-line {
            position: absolute;
            top: -14px;
            height: 14px;
            width: 2px;
            background: rgba(255,255,255,0.3);
        }

        .threshold-label {
            position: absolute;
            top: 2px;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            white-space: nowrap;
        }

        .pass-color { color: #2ecc71; }
        .fail-color { color: #e74c3c; }

        #retry-btn, #go-to-prompt-btn {
            margin-top: 32px;
            opacity: 0;
            animation: btnPop 0.5s 0.9s forwards;
        }

        .result-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* --- PROMPT SECTION --- */
        #prompt-section {
            display: none;
        }

        #prompt-section h2 {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #prompt-section .prompt-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .prompt-textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px 18px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #eee;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.3s;
            outline: none;
        }

        .prompt-textarea:focus {
            border-color: rgba(241, 196, 15, 0.5);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.1);
        }

        .prompt-textarea::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .char-count {
            text-align: right;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.25);
            margin-top: 6px;
            margin-bottom: 20px;
        }

        #evaluate-btn {
            display: block;
            width: 100%;
        }

        #evaluate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- PROMPT RESULT --- */
        #prompt-result {
            display: none;
            margin-top: 28px;
        }

        .prompt-score-circle {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }

        .prompt-score-svg {
            transform: rotate(-90deg);
            width: 120px;
            height: 120px;
        }

        .prompt-score-track {
            fill: none;
            stroke: rgba(255,255,255,0.06);
            stroke-width: 6;
        }

        .prompt-score-fill {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 314.16;
            stroke-dashoffset: 314.16;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .prompt-score-number {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 800;
        }

        .prompt-score-label {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 20px;
        }

        .ai-feedback {
            padding: 18px 20px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.75);
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .ai-feedback-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        #prompt-retry-btn {
            margin-top: 24px;
            display: block;
            width: 100%;
        }

        .prompt-error {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            font-size: 0.9rem;
            display: none;
        }

        /* --- CONFETTI CANVAS --- */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 50;
            pointer-events: none;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 500px) {
            .container { padding: 28px 20px; }
            #video-section h1 { font-size: 1.5rem; }
            .question-text { font-size: 1.1rem; }
            #result-section h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Animated background orbs -->
    <div class="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Confetti canvas (for pass result) -->
    <canvas id="confetti-canvas"></canvas>

    <div class="container">

        <!-- VIDEO SECTION -->
        <div id="video-section" class="section">
            <h1>Yapay Zeka Quiz</h1>
            <p class="subtitle">Bilgini test et!</p>
            <canvas id="mock-video-canvas" width="620" height="350"></canvas>
            <p id="video-subtitle">Introyu izle, sonra quiz'e basla!</p>
            <button id="start-quiz-btn" class="btn-primary" onclick="startQuiz()">Quiz'e Basla</button>
        </div>

        <!-- QUIZ SECTION -->
        <div id="quiz-section">
            <div class="quiz-header">
                <span class="question-count" id="question-count"></span>
                <div class="timer-wrapper">
                    <svg class="timer-svg" viewBox="0 0 48 48">
                        <circle class="timer-track" cx="24" cy="24" r="22" />
                        <circle class="timer-fill" id="timer-circle" cx="24" cy="24" r="22" />
                    </svg>
                    <span class="timer-text" id="timer-text"></span>
                </div>
            </div>
            <div class="progress-bar">
                <div class="fill" id="progress-fill"></div>
            </div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options"></div>
            <div id="explanation" style="display:none; margin-top:16px; padding:14px 18px; border-radius:12px; background:rgba(255,255,255,0.05); border-left:3px solid #f1c40f; color:rgba(255,255,255,0.7); font-size:0.92rem; line-height:1.5;"></div>
            <button id="next-btn" class="btn-secondary" onclick="nextQuestion()">Sonraki &rarr;</button>
        </div>

        <!-- RESULT SECTION -->
        <div id="result-section">
            <div class="result-icon" id="result-icon"></div>
            <h2 id="result-title"></h2>
            <p class="score-text" id="score-text"></p>
            <div class="score-bar-wrapper">
                <div class="score-bar-bg">
                    <div class="score-bar-fill" id="score-bar-fill"></div>
                </div>
                <div class="threshold-marker">
                    <div class="threshold-line" id="threshold-line"></div>
                    <span class="threshold-label" id="threshold-label"></span>
                </div>
            </div>
            <p class="score-text" id="threshold-text"></p>
            <div class="result-buttons">
                <button id="retry-btn" class="btn-secondary" onclick="location.reload()">Tekrar Dene</button>
                <button id="go-to-prompt-btn" class="btn-primary" onclick="goToPrompt()">Prompt Challange &rarr;</button>
            </div>
        </div>

        <!-- PROMPT SECTION -->
        <div id="prompt-section">
            <h2>Prompt Challenge</h2>
            <p class="prompt-subtitle">
                Ogrendigini goster! Asagiya bir yapay zeka promptu yaz.<br>
                AI senin promptunu degerlendirip puan verecek.
            </p>
            <textarea class="prompt-textarea" id="prompt-input" placeholder="Ornegin: Uzayda yasayan bir kedi hakkinda, cocuklara yonelik, egitici ve 200 kelimelik bir hikaye yaz..." oninput="updateCharCount()"></textarea>
            <div class="char-count"><span id="char-count">0</span> karakter</div>
            <button id="evaluate-btn" class="btn-primary" onclick="evaluatePrompt()">Degerlendir</button>
            <div class="prompt-error" id="prompt-error"></div>

            <!-- Prompt AI Result -->
            <div id="prompt-result">
                <div class="prompt-score-circle">
                    <svg class="prompt-score-svg" viewBox="0 0 120 120">
                        <circle class="prompt-score-track" cx="60" cy="60" r="50" />
                        <circle class="prompt-score-fill" id="prompt-score-circle" cx="60" cy="60" r="50" />
                    </svg>
                    <span class="prompt-score-number" id="prompt-score-number">0</span>
                </div>
                <div class="prompt-score-label" id="prompt-score-label"></div>
                <div class="ai-feedback-label">AI Degerlendirmesi</div>
                <div class="ai-feedback" id="ai-feedback"></div>
                <button id="prompt-retry-btn" class="btn-secondary" onclick="retryPrompt()">Baska Bir Prompt Dene</button>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================

        const PASS_THRESHOLD = 70;
        const TIME_PER_QUESTION = 15;
        // API key is stored securely on the server side

        const questions = [
            {
                question: "Yapay zeka nedir?",
                options: ["Insan gibi dusunebilen bilgisayar programlari", "Sadece oyun oynayan makineler", "Sadece robotlar", "Internetsiz calisan bilgisayarlar"],
                answer: 0,
                explanation: "Yapay zeka, bilgisayarlarin ogrenme, dusunme ve karar verme gibi insan benzeri gorevleri yapabilmesidir."
            },
            {
                question: "Asagidakilerden hangisi yapay zeka degildir?",
                options: ["Sesli asistan (Siri, Alexa)", "YouTube onerileri", "Hesap makinesi", "ChatGPT"],
                answer: 2,
                explanation: "Hesap makinesi sadece verilen islemi yapar, ogrenmez veya tahmin uretmez."
            },
            {
                question: "Iyi bir prompt nedir?",
                options: ["Kisa ve belirsiz soru", "Acik ve detayli istek", "Sadece tek kelime", "Hic soru sormamak"],
                answer: 1,
                explanation: "Yapay zekaya ne istedigini acik soylersen daha iyi sonuc alirsin."
            },
            {
                question: "Hangisi daha iyi bir prompttur?",
                options: ["\"Hikaye yaz\"", "\"Kisa bir hikaye yaz\"", "\"Uzayda gecen, komik ve 100 kelimelik bir hikaye yaz\"", "\"Bir seyler yaz\""],
                answer: 2,
                explanation: "Detay eklemek sonucu daha kaliteli ve dogru hale getirir."
            },
            {
                question: "Yapay zeka hata yapabilir mi?",
                options: ["Hayir, asla hata yapmaz", "Evet, bazen yanlis cevap verebilir", "Sadece matematikte hata yapar", "Sadece cocuklara hata yapar"],
                answer: 1,
                explanation: "Yapay zeka her zaman dogru degildir, kontrol etmek gerekir."
            },
            {
                question: "Yapay zeka nasil ogrenir?",
                options: ["Kitap okuyarak", "Insanlarin verdigi verilerle", "Uyuyarak", "Kendi kendine dogustan bilerek"],
                answer: 1,
                explanation: "Yapay zeka, insanlarin sagladigi verilerle egitilir."
            },
            {
                question: "Kotu bir prompt hangisidir?",
                options: ["\"5. sinif icin basit bir matematik sorusu olustur\"", "\"Turkiye'nin baskentini acikla\"", "\"Bir sey yap\"", "\"Kisa bir masal yaz\""],
                answer: 2,
                explanation: "Ne istedigin belli degilse yapay zeka da dogru cevap veremez."
            },
            {
                question: "Yapay zeka neden bazen yanlis bilgi verir?",
                options: ["Cunku uzgundur", "Cunku her seyi bilemez", "Cunku calismak istemez", "Cunku internet yoktur"],
                answer: 1,
                explanation: "Yapay zeka her bilgiyi %100 dogru bilemez ve bazen tahmin yapar."
            },
            {
                question: "Hangisi iyi bir prompt ornegidir?",
                options: ["\"Resim\"", "\"Bana hayvan ciz\"", "\"Mavi renkli, ucan bir ejderha resmi ciz\"", "\"Bir sey ciz\""],
                answer: 2,
                explanation: "Detayli tarif = daha dogru ve guzel sonuc."
            },
            {
                question: "Yapay zekayi kullanirken ne yapmaliyiz?",
                options: ["Her soyledigine inanmaliyiz", "Hic kullanmamaliyiz", "Sonuclari kontrol etmeliyiz", "Sadece oyun icin kullanmaliyiz"],
                answer: 2,
                explanation: "Yapay zeka yardimcidir ama kontrol etmek her zaman onemlidir."
            }
        ];

        // ============================================================
        // STATE
        // ============================================================

        let currentQuestion = 0;
        let score = 0;
        let timeLeft = 0;
        let timerInterval = null;
        let introAnimId = null;
        const CIRCUMFERENCE = 2 * Math.PI * 22; // ~138.23

        // ============================================================
        // MOCK VIDEO INTRO (Canvas animation)
        // ============================================================

        const canvas = document.getElementById('mock-video-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-quiz-btn');
        const INTRO_DURATION = 8;
        let introStart = null;
        let introEnded = false;

        const particles = Array.from({ length: 80 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2.5 + 0.5,
            dx: (Math.random() - 0.5) * 1.2,
            dy: (Math.random() - 0.5) * 1.2,
            hue: Math.random() * 30 + 340, // pinkish-red range
        }));

        function drawIntro(timestamp) {
            if (!introStart) introStart = timestamp;
            const elapsed = (timestamp - introStart) / 1000;
            const progress = Math.min(elapsed / INTRO_DURATION, 1);

            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw particle connections
            particles.forEach((p, idx) => {
                p.x += p.dx;
                p.y += p.dy;
                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

                // Connect nearby particles
                for (let j = idx + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(233, 69, 96, ${0.12 * (1 - dist / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, ${0.4 + 0.3 * Math.sin(elapsed * 2 + idx)})`;
                ctx.fill();
            });

            // Pulsing rings
            for (let i = 0; i < 3; i++) {
                const ringRadius = 50 + i * 25 + 15 * Math.sin(elapsed * 2.5 + i);
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height / 2 - 10, ringRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(233, 69, 96, ${0.2 - i * 0.05})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Spinning arcs
            for (let i = 0; i < 2; i++) {
                const arcR = 70 + i * 30;
                const arcStart = elapsed * (2 + i) * (i % 2 === 0 ? 1 : -1);
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height / 2 - 10, arcR, arcStart, arcStart + 1.2);
                ctx.strokeStyle = `rgba(233, 69, 96, ${0.7 - i * 0.2})`;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            // Title
            const titleAlpha = Math.min(elapsed / 1.5, 1);
            ctx.save();
            ctx.globalAlpha = titleAlpha;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Hazir Ol!', canvas.width / 2, canvas.height / 2 - 5);
            ctx.restore();

            // Subtitle
            const subAlpha = Math.max(0, Math.min((elapsed - 1.5) / 1, 1));
            ctx.save();
            ctx.globalAlpha = subAlpha;
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '16px Inter, sans-serif';
            ctx.fillText('Quiz baslamak uzere...', canvas.width / 2, canvas.height / 2 + 30);
            ctx.restore();

            // Countdown
            const remaining = Math.max(0, Math.ceil(INTRO_DURATION - elapsed));
            if (remaining > 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.font = '600 13px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`${remaining} saniye sonra basliyor`, canvas.width / 2, canvas.height - 30);
            }

            // Bottom progress bar
            const barW = canvas.width - 80;
            ctx.fillStyle = 'rgba(255,255,255,0.06)';
            roundRect(ctx, 40, canvas.height - 16, barW, 5, 3);
            ctx.fill();
            ctx.fillStyle = '#e94560';
            roundRect(ctx, 40, canvas.height - 16, barW * progress, 5, 3);
            ctx.fill();

            if (progress < 1) {
                introAnimId = requestAnimationFrame(drawIntro);
            } else {
                introEnded = true;
                // Final frame
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(233, 69, 96, 0.15)';
                    ctx.fill();
                });

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 30px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Hazirsan Quiz\'e Basla!', canvas.width / 2, canvas.height / 2);

                startBtn.style.display = 'inline-block';
            }
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        introAnimId = requestAnimationFrame(drawIntro);

        setTimeout(() => {
            if (!introEnded) startBtn.style.display = 'inline-block';
        }, 3000);

        // ============================================================
        // QUIZ LOGIC
        // ============================================================

        function startQuiz() {
            cancelAnimationFrame(introAnimId);
            const videoSection = document.getElementById('video-section');
            videoSection.style.opacity = '0';
            videoSection.style.transform = 'translateY(-20px)';
            videoSection.style.transition = 'all 0.4s ease';

            setTimeout(() => {
                videoSection.style.display = 'none';
                const quizSection = document.getElementById('quiz-section');
                quizSection.style.display = 'block';
                quizSection.classList.add('section');
                showQuestion();
            }, 400);
        }

        function showQuestion() {
            const q = questions[currentQuestion];

            document.getElementById('question-count').textContent =
                `Soru ${currentQuestion + 1} / ${questions.length}`;

            document.getElementById('progress-fill').style.width =
                `${((currentQuestion) / questions.length) * 100}%`;

            // Animate question text
            const qText = document.getElementById('question-text');
            qText.style.animation = 'none';
            qText.offsetHeight; // trigger reflow
            qText.style.animation = 'fadeSlideIn 0.5s 0.1s forwards';
            qText.textContent = q.question;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
                btn.onclick = () => selectAnswer(i);
                optionsDiv.appendChild(btn);

                // Staggered reveal
                setTimeout(() => btn.classList.add('visible'), 150 + i * 80);
            });

            document.getElementById('next-btn').style.display = 'none';
            hideExplanation();

            // Reset & start timer
            timeLeft = TIME_PER_QUESTION;
            updateTimerDisplay();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timeUp();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const circle = document.getElementById('timer-circle');
            const text = document.getElementById('timer-text');
            const fraction = timeLeft / TIME_PER_QUESTION;
            const offset = CIRCUMFERENCE * (1 - fraction);
            circle.style.strokeDashoffset = offset;

            text.textContent = timeLeft;

            const isWarning = timeLeft <= 5;
            circle.classList.toggle('warning', isWarning);
            text.classList.toggle('warning', isWarning);
        }

        function showExplanation(text) {
            const el = document.getElementById('explanation');
            el.textContent = '💡 ' + text;
            el.style.display = 'block';
            el.style.animation = 'fadeSlideIn 0.4s forwards';
        }

        function hideExplanation() {
            const el = document.getElementById('explanation');
            el.style.display = 'none';
        }

        function showFlash(type) {
            const flash = document.createElement('div');
            flash.className = `score-flash ${type}`;
            flash.textContent = type === 'correct' ? '+1' : type === 'wrong' ? 'X' : 'Sure Doldu!';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 900);
        }

        function selectAnswer(selectedIndex) {
            clearInterval(timerInterval);

            const q = questions[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');

            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.answer) btn.classList.add('correct');
                if (i === selectedIndex && i !== q.answer) btn.classList.add('wrong');
            });

            if (selectedIndex === q.answer) {
                score++;
                showFlash('correct');
            } else {
                showFlash('wrong');
            }

            showExplanation(q.explanation);
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function timeUp() {
            const q = questions[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');

            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.answer) btn.classList.add('correct');
            });

            showFlash('timeout');
            showExplanation(q.explanation);
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // ============================================================
        // RESULT
        // ============================================================

        function showResult() {
            clearInterval(timerInterval);

            const quizSection = document.getElementById('quiz-section');
            quizSection.style.opacity = '0';
            quizSection.style.transform = 'translateY(-20px)';
            quizSection.style.transition = 'all 0.4s ease';

            setTimeout(() => {
                quizSection.style.display = 'none';
                const resultSection = document.getElementById('result-section');
                resultSection.style.display = 'block';
                resultSection.classList.add('section');

                const percentage = Math.round((score / questions.length) * 100);
                const passed = percentage >= PASS_THRESHOLD;

                document.getElementById('result-icon').textContent = passed ? '🎉' : '😞';
                document.getElementById('result-title').textContent =
                    passed ? 'Tebrikler, Gectin!' : 'Maalesef, Gecemedin';
                document.getElementById('result-title').style.color = passed ? '#2ecc71' : '#e74c3c';
                document.getElementById('score-text').textContent =
                    `Puanin: ${score} / ${questions.length} (${percentage}%)`;
                document.getElementById('threshold-text').textContent =
                    `Gecme siniri: ${PASS_THRESHOLD}%`;

                // Animated score bar
                const barFill = document.getElementById('score-bar-fill');
                barFill.className = `score-bar-fill ${passed ? 'pass' : 'fail'}`;
                setTimeout(() => { barFill.style.width = `${percentage}%`; }, 50);

                // Threshold marker
                const thLine = document.getElementById('threshold-line');
                const thLabel = document.getElementById('threshold-label');
                thLine.style.left = `${PASS_THRESHOLD}%`;
                thLabel.style.left = `${PASS_THRESHOLD}%`;
                thLabel.textContent = `${PASS_THRESHOLD}% gecme siniri`;

                // Confetti on pass
                if (passed) launchConfetti();
            }, 400);
        }

        // ============================================================
        // CONFETTI
        // ============================================================

        function launchConfetti() {
            const c = document.getElementById('confetti-canvas');
            const ctx2 = c.getContext('2d');
            c.width = window.innerWidth;
            c.height = window.innerHeight;

            const pieces = Array.from({ length: 150 }, () => ({
                x: Math.random() * c.width,
                y: Math.random() * c.height - c.height,
                r: Math.random() * 6 + 3,
                dx: (Math.random() - 0.5) * 4,
                dy: Math.random() * 3 + 2,
                rot: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 8,
                color: ['#e94560', '#2ecc71', '#3498db', '#f1c40f', '#9b59b6', '#ff6b8a', '#00d2d3'][Math.floor(Math.random() * 7)],
                shape: Math.random() > 0.5 ? 'rect' : 'circle',
            }));

            let frame = 0;
            function drawConfetti() {
                ctx2.clearRect(0, 0, c.width, c.height);
                pieces.forEach(p => {
                    p.x += p.dx;
                    p.y += p.dy;
                    p.dy += 0.04; // gravity
                    p.rot += p.rotSpeed;

                    ctx2.save();
                    ctx2.translate(p.x, p.y);
                    ctx2.rotate((p.rot * Math.PI) / 180);
                    ctx2.fillStyle = p.color;
                    ctx2.globalAlpha = Math.max(0, 1 - frame / 180);

                    if (p.shape === 'rect') {
                        ctx2.fillRect(-p.r / 2, -p.r, p.r, p.r * 2);
                    } else {
                        ctx2.beginPath();
                        ctx2.arc(0, 0, p.r / 2, 0, Math.PI * 2);
                        ctx2.fill();
                    }
                    ctx2.restore();
                });

                frame++;
                if (frame < 200) {
                    requestAnimationFrame(drawConfetti);
                } else {
                    ctx2.clearRect(0, 0, c.width, c.height);
                }
            }
            drawConfetti();
        }

        // ============================================================
        // PROMPT CHALLENGE
        // ============================================================

        const PROMPT_SCORE_CIRCUMFERENCE = 2 * Math.PI * 50; // ~314.16

        function goToPrompt() {
            const resultSection = document.getElementById('result-section');
            resultSection.style.opacity = '0';
            resultSection.style.transform = 'translateY(-20px)';
            resultSection.style.transition = 'all 0.4s ease';

            setTimeout(() => {
                resultSection.style.display = 'none';
                const promptSection = document.getElementById('prompt-section');
                promptSection.style.display = 'block';
                promptSection.classList.add('section');
                document.getElementById('prompt-input').focus();
            }, 400);
        }

        function updateCharCount() {
            const count = document.getElementById('prompt-input').value.length;
            document.getElementById('char-count').textContent = count;
        }

        async function evaluatePrompt() {
            const promptText = document.getElementById('prompt-input').value.trim();
            const errorEl = document.getElementById('prompt-error');
            errorEl.style.display = 'none';

            if (promptText.length < 10) {
                errorEl.textContent = 'Lutfen en az 10 karakter uzunlugunda bir prompt yaz.';
                errorEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('evaluate-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>AI degerlendiriyor...';

            try {
                const response = await fetch('/.netlify/functions/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || `Sunucu hatasi: ${response.status}`);
                }

                const content = await response.text();

                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error('AI yaniti okunamadi.');

                const result = JSON.parse(jsonMatch[0]);
                showPromptResult(result);

            } catch (err) {
                errorEl.textContent = 'Hata: ' + err.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Degerlendir';
            }
        }

        function showPromptResult(result) {
            const btn = document.getElementById('evaluate-btn');
            btn.style.display = 'none';

            const resultDiv = document.getElementById('prompt-result');
            resultDiv.style.display = 'block';
            resultDiv.style.animation = 'sectionIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards';

            const puan = Math.max(0, Math.min(100, result.puan));

            // Animate score number
            let current = 0;
            const scoreNum = document.getElementById('prompt-score-number');
            const interval = setInterval(() => {
                current += 1;
                if (current > puan) { current = puan; clearInterval(interval); }
                scoreNum.textContent = current;
            }, 15);

            // Score circle color
            const circle = document.getElementById('prompt-score-circle');
            let strokeColor;
            if (puan >= 80) strokeColor = '#2ecc71';
            else if (puan >= 50) strokeColor = '#f1c40f';
            else strokeColor = '#e74c3c';

            circle.style.stroke = strokeColor;
            scoreNum.style.color = strokeColor;

            // Animate circle fill
            setTimeout(() => {
                const offset = PROMPT_SCORE_CIRCUMFERENCE * (1 - puan / 100);
                circle.style.strokeDashoffset = offset;
            }, 100);

            // Score label
            const label = document.getElementById('prompt-score-label');
            if (puan >= 80) label.textContent = 'Mukemmel prompt!';
            else if (puan >= 60) label.textContent = 'Iyi prompt, biraz daha detay eklenebilir.';
            else if (puan >= 40) label.textContent = 'Ortalama, daha fazla detay gerekli.';
            else label.textContent = 'Zayif prompt, cok daha fazla detay ekle.';

            // Feedback text with breakdown
            let feedback = result.degerlendirme + '\n\n';
            feedback += `Aciklik: ${result.aciklik}/25  |  `;
            feedback += `Detay: ${result.detay}/25  |  `;
            feedback += `Amac: ${result.amac}/25  |  `;
            feedback += `Yaraticilik: ${result.yaraticilik}/25`;

            document.getElementById('ai-feedback').textContent = feedback;

            // Confetti if great prompt
            if (puan >= 80) launchConfetti();
        }

        function retryPrompt() {
            document.getElementById('prompt-input').value = '';
            document.getElementById('char-count').textContent = '0';
            document.getElementById('prompt-result').style.display = 'none';
            document.getElementById('prompt-error').style.display = 'none';
            const btn = document.getElementById('evaluate-btn');
            btn.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Degerlendir';
            document.getElementById('prompt-input').focus();

            // Reset circle
            document.getElementById('prompt-score-circle').style.strokeDashoffset = PROMPT_SCORE_CIRCUMFERENCE;
        }
    </script>
